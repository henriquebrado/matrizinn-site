<div class="lang-container">

</p>

</div>

<div class="slide">
<img src="imgs/fafe2.jpg" loading="lazy">
</div>

<div class="slide">
<img src="imgs/fafe3.jpg" loading="lazy">
</div>

<a class="prev" onclick="plusSlides(-1)">❮</a>
<a class="next" onclick="plusSlides(1)">❯</a>

<script>

const translations={
pt:{
title:"Chegou o momento ✨",
intro1:"É com muito orgulho que apresentamos o <b>Matriz Inn</b>",
intro2:"Alojamento local no centro de Fafe com conforto e qualidade.",
visit:"Visite Fafe",
bookings:"Reservas através de WhatsApp"
},
en:{
title:"The moment has arrived ✨",
intro1:"We proudly present <b>Matriz Inn</b>",
intro2:"Local accommodation in the center of Fafe.",
visit:"Visit Fafe",
bookings:"Bookings via WhatsApp"
}
};

function changeLanguage(lang){

localStorage.setItem("lang",lang);

document.getElementById("title").innerHTML=translations[lang].title;
document.getElementById("intro1").innerHTML=translations[lang].intro1;
document.getElementById("intro2").innerHTML=translations[lang].intro2;
document.getElementById("visit").innerHTML=translations[lang].visit;
document.getElementById("bookings").innerHTML=translations[lang].bookings;

document.querySelectorAll(".lang-container img").forEach(i=>i.classList.remove("active"));
event.target.classList.add("active");

}

const savedLang=localStorage.getItem("lang");

if(savedLang){
changeLanguage(savedLang);
}

let slideIndex=1;

showSlides(slideIndex);

function plusSlides(n){
showSlides(slideIndex+=n);
}

function showSlides(n){

let slides=document.getElementsByClassName("slide");

if(n>slides.length){slideIndex=1}
if(n<1){slideIndex=slides.length}

for(let i=0;i<slides.length;i++){
slides[i].style.display="none";
}

slides[slideIndex-1].style.display="block";

}

</script>

</body>
</html>
